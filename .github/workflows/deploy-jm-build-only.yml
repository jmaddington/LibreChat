name: Docker Build Only (No Push)

on:
  # Run on pull requests
  pull_request:
    branches:
      - main
      - jm-production
      - release/*
      - 'tracking/**'
      - 'feature/**'
  
  # Allow manual triggering with custom parameters
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'jm-production'
        type: string
      dockerfile:
        description: 'Dockerfile to use'
        required: false
        default: 'Dockerfile.multi'
        type: string

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4
        with:
          # For PRs, use the PR merge commit; for manual runs, use the specified branch
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.branch || 'jm-production' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v4
        with:
          context: .
          # Use specified Dockerfile or default
          file: ${{ github.event.inputs.dockerfile || 'Dockerfile.multi' }}
          push: false
          # Add build cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Output built image to local Docker engine
          load: true
          tags: librechat:local-build